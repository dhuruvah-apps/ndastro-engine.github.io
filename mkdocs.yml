site_name: ND Astro Engine Documentation
site_description: Python library for Vedic astrology (Jyotish) calculations - ayanamsa systems, planet positions, nakshatras, rashis, transits, dashas, retrograde periods, sunrise/sunset times & panchang. Open-source astronomical computation engine.
site_author: Dhuruvah Apps
site_url: https://ndastro-engine.dhuruvah.in/

repo_name: dhuruvah-apps/ndastro-core
repo_url: https://github.com/dhuruvah-apps/ndastro-core.git
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/lightbulb-auto
      name: Switch to light mode
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: blue grey
    accent: teal
    toggle:
      icon: material/lightbulb
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: blue grey
    accent: teal
    toggle:
      icon: material/lightbulb-outline
      name: Switch to system preference
  features:
  - content.code.annotate
  - content.code.copy
  # - content.code.select
  - content.footnote.tooltips
  - navigation.tabs
  - content.tabs.link
  - navigation.tabs.sticky
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.instant
  - navigation.instant.prefetch
  # - navigation.instant.preview
  - navigation.instant.progress
  - navigation.path
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.share
  - search.suggest
  - toc.follow

  icon:
    repo: fontawesome/brands/github-alt
  logo: /assets/images/logo.svg
  favicon: img/icon.ico
  language: en

plugins:
  - search
  - social
  - typeset
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - User Guide:
      - Ayanamsa Calculations: guide/ayanamsa.md
      - Planet Positions: guide/planets.md
      - Sunrise & Sunset: guide/sunrise-sunset.md
      - Retrograde Periods: guide/retrograde.md
  - API Reference:
      - Core: api/core.md
      - Ayanamsa: api/ayanamsa.md
      - Utils: api/utils.md
      - Enums: api/enums.md
  - Contributing: contributing.md
  - Changelog: changelog.md
